version: '3.9'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dermscan-api
    ports:
      - "8000:8000"
    volumes:
      # Mount your trained model file here:
      - ./models:/app/models:ro
    environment:
      - MODEL_PATH=/app/models/dermscan_2019.keras
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dermscan-ui
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: dermscan-net
  postgres:
  image: postgres:16-alpine
  environment:
    POSTGRES_DB: dermscan
    POSTGRES_USER: dermscan
    POSTGRES_PASSWORD: secret
  volumes:
    - pgdata:/var/lib/postgresql/data

backend:
  environment:
    - DATABASE_URL=postgresql://dermscan:secret@postgres/dermscan
    - JWT_SECRET=your-secret-key-here
